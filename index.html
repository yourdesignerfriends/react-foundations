<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- First step: add an import map in the <head> so the browser knows where to load React and ReactDOM from. -->
    <!-- Added import map entry for react/jsx-runtime so the browser can resolve JSX helper functions used by React. -->
    <script type="importmap">
        {
            "imports": {
            "react": "https://esm.sh/react@latest?dev",
            "react-dom/client": "https://esm.sh/react-dom@latest/client?dev",
            "react/jsx-runtime": "https://esm.sh/react@latest/jsx-runtime?dev"
            }
        }
    </script>
    <!-- Added Babel Standalone script so the browser can compile JSX and modern JavaScript without a build step -->
    <script src="https://unpkg.com/@babel/standalone@latest/babel.min.js"></script>
</head>
<body>
    <!-- Then give the div a unique id so that you can target it later. -->
    <div id="app"></div>
    <!-- This module script imports React and ReactDOM, initializes a React root, and renders JSX into the #app div. -->
    <!-- This script uses Babel Standalone to transpile JSX and resolve ES module imports through the import map. -->
    <script type="text/babel" data-type="module" data-presets="react">
        import React from 'react';
        import { createRoot } from 'react-dom/client';
    
        const domNode = document.getElementById('app');

        //In React, components are functions. Inside your script tag, create a new function called header:
        function header() {
            // A component is a function that returns UI elements. Inside the return statement of the function, you can write JSX:
            return <h1>Develop. Preview. Ship. Analina.</h1>;
        }

        // The HomePage component is the top-level component of the app. 
        //  It returns a <div> that contains the Header component inside it. 
        //  Nesting components like this allows React to build the UI from small, 
        //  reusable pieces. HomePage acts as the parent component, and Header 
        //  is one of its child components.
        function HomePage() {
            return (
                <div>
                    {/* Nesting the Header component */}
                    <Header />
                </div>
            );
        }

        const root = createRoot(domNode);
        // Capitalize the React Component, Second, you use React components the same way you'd use regular HTML tags, with angle 
        // brackets and a closing tag. In this case, you can use the <Header /> component inside the render method of the root:
        root.render(<Header />);
    </script>
</body>
</html>
